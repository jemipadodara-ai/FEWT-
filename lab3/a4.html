<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=0,b=1,next
        let result=""
        let n=parseFloat(prompt("enter n:"))
        for(let i=1;i<=n;i++){
            result=result+a

            if(i !==n){
                result=result + ","
            }
            next=a+b
            a=b
            b=next

        }
        alert(result)
    </script>
</body>
</html>
