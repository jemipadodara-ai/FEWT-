<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let n=parseFloat(prompt("enter a number:"))
        let rem=0,rev=0
        temp=n
        while(n!=0){
            rem=n%10
            rev=rev*10+rem
            n=parseInt(n/10)
        }
        if(temp==rev){
            document.write("palindrome")
        }else{
            document.write("not palindrome")
        }
    </script>
</body>
</html>
