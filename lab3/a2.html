<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let a=parseFloat(prompt("enter a numberP:"))
        flag=0
        for(let i=2; i<= Math.sqrt(a) ; i++){
            if(a%i==0){
                flag++
                break;
            }
        }
        if(flag==0){
            alert("Is a prime number")
        }else{
            alert("not prime")
        }
    </script>
</body>
</html>
